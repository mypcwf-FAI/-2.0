<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月供戰略指揮系統模擬器 | 輝仔特製 V8.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #00d2ff; --qi-red: #ff4757; --zheng-green: #2ed573; 
            --dark-bg: #0f172a; --panel-bg: #1e293b; --text-glow: 0 0 10px rgba(0,210,255,0.5);
            --gold: #f1c40f;
        }
        * { box-sizing: border-box; }
        body { font-family: 'PingFang HK', 'Segoe UI', sans-serif; margin: 0; background: var(--dark-bg); color: #e2e8f0; }
        
        .hero { 
            height: 150px; background: linear-gradient(180deg, #0f172a 0%, #1e3c72 100%);
            display: flex; align-items: center; justify-content: center; text-align: center; border-bottom: 2px solid var(--gold);
        }
        .disclaimer { background: #450a0a; color: #fca5a5; padding: 8px; text-align: center; font-size: 12px; }

        .container { max-width: 1400px; margin: 20px auto; display: grid; grid-template-columns: 380px 1fr; gap: 25px; padding: 0 20px; }
        
        /* 指揮官面板 */
        .commander-panel { background: var(--panel-bg); padding: 25px; border-radius: 15px; border: 1px solid #334155; position: sticky; top: 20px; }
        .panel-title { font-size: 1.1rem; color: var(--gold); margin-bottom: 15px; font-weight: bold; border-left: 4px solid var(--gold); padding-left: 10px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #94a3b8; }
        input, select { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; }

        /* 戰術系統選擇 */
        .system-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .sys-btn { padding: 10px; border: 1px solid #334155; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; transition: 0.3s; background: #0f172a; }
        .sys-btn.active { border-color: var(--primary); background: rgba(0, 210, 255, 0.1); box-shadow: var(--text-glow); }

        .preview-box { background: #020617; border-radius: 12px; padding: 15px; border: 1px solid var(--primary); }
        .preview-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .preview-val { font-weight: bold; color: var(--primary); }

        /* 戰區 */
        .strategy-view { background: var(--panel-bg); padding: 30px; border-radius: 15px; border: 1px solid #334155; }
        .visual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .chart-box { background: #0f172a; padding: 20px; border-radius: 15px; }

        .army-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .army-table th { text-align: left; padding: 12px; color: #64748b; border-bottom: 2px solid #334155; font-size: 14px; }
        .army-table td { padding: 12px; border-bottom: 1px solid #1e293b; font-size: 14px; }

        .tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .tag-env { background: rgba(241, 196, 15, 0.1); color: var(--gold); border: 1px solid var(--gold); }
        
        .ticker-select { background: transparent; color: var(--primary); border: none; font-weight: bold; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<div class="disclaimer">⚠️ 戰場模擬用途。標的數據源於兵工房 V8.0，所有模擬均以「以戰養戰」為核心。</div>

<div class="hero">
    <div>
        <h1 style="margin:0; font-size: 1.8rem; color: var(--primary);">(月供戰略指揮系統模擬器)</h1>
    </div>
</div>

<div class="container">
    <div class="commander-panel">
        <div class="panel-title">戰略參數設定</div>
        
        <div class="form-group">
            <label>指揮官當前年齡</label>
            <input type="number" id="user-age" value="42" onchange="updateSimulation()">
        </div>

        <div class="form-group">
            <label>戰場環境 (AI 自動檢查中)</label>
            <select id="market-cycle" onchange="updateSimulation()">
                <option value="bull1">牛市初期：先鋒突擊 (奇6:正4)</option>
                <option value="bull2" selected>牛市中期：全面擴張 (奇5:正5)</option>
                <option value="bull3">牛市末期：戰略防禦 (奇2:正8)</option>
                <option value="bear2">熊市中期：堅壁清野 (奇0:正10)</option>
            </select>
        </div>

        <label>戰術系統選擇</label>
        <div class="system-selector">
            <div class="sys-btn active" onclick="setSystem('balanced', this)">平衡型</div>
            <div class="sys-btn" onclick="setSystem('offensive', this)">進攻型</div>
            <div class="sys-btn" onclick="setSystem('defensive', this)">防守型</div>
        </div>

        <div class="form-group">
            <label>每月補給量 (HKD)</label>
            <input type="number" id="budget-input" value="10000" oninput="updateSimulation()">
        </div>

        <div class="preview-box">
            <div style="font-size:12px; color:var(--gold); margin-bottom:10px; font-weight:bold;">模擬收益預覽</div>
            <div class="preview-item"><span>預期年化總回報</span><span class="preview-val" id="total-return">--%</span></div>
            <div class="preview-item"><span>預期年化股息</span><span class="preview-val" id="dividend-return">--%</span></div>
            <div class="preview-item"><span>風險承受系數</span><span class="preview-val" id="risk-score">適中</span></div>
        </div>
    </div>

    <div class="strategy-view">
        <div id="strategy-header" style="margin-bottom:25px;">
            <h2 id="env-title" style="color:var(--primary); margin:0;">主升擴張陣法</h2>
            <p id="env-desc" style="color:#94a3b8; font-size:14px; margin-top:8px;"></p>
        </div>

        <div class="visual-grid">
            <div class="chart-box"><canvas id="ratioChart"></canvas></div>
            <div class="chart-box"><canvas id="radarChart"></canvas></div>
        </div>

        <div class="chart-box">
            <h4 style="margin:0 0 15px 0; color:var(--gold);">當前兵種部署與戰役環境說明</h4>
            <table class="army-table">
                <thead>
                    <tr>
                        <th>兵種種類</th>
                        <th>核心標的 (可更換)</th>
                        <th>分配權重</th>
                        <th>戰役環境適用</th>
                    </tr>
                </thead>
                <tbody id="army-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let currentSystem = 'balanced';
let charts = {};

// 模擬標的數據
const weaponData = {
    "MSFT": { ret: 0.25, div: 0.008, env: "AI算力/雲端壟斷期" },
    "NVDA": { ret: 0.78, div: 0.001, env: "半導體爆發/算力荒" },
    "AAPL": { ret: 0.21, div: 0.005, env: "消費電子穩健期" },
    "QQQ": { ret: 0.26, div: 0.006, env: "科技牛市主升段" },
    "GRID": { ret: 0.20, div: 0.021, env: "全球能源轉型/智能電網" },
    "SCHD": { ret: 0.10, div: 0.037, env: "高利息環境/防守反擊" },
    "O": { ret: 0.06, div: 0.051, env: "降息預期/月月收租" },
    "XOM": { ret: 0.28, div: 0.035, env: "高通脹/能源短缺期" },
    "AGG": { ret: 0.04, div: 0.034, env: "資產避險/熊市壓艙石" },
    "POWR": { ret: 0.12, div: 0.031, env: "基礎設施剛需/AI電力供應" },
    "VIG": { ret: 0.12, div: 0.018, env: "股息增長/穿越牛熊" },
    "VUG": { ret: 0.27, div: 0.006, env: "成長股主導行情" }
};

const systems = {
    offensive: {
        label: "進攻型",
        troops: [
            { type: "長弓精銳", options: ["NVDA", "MSFT", "AAPL"], default: "NVDA" },
            { type: "連弩齊射", options: ["QQQ", "VUG", "GRID"], default: "QQQ" },
            { type: "輕騎突擊", options: ["GRID", "MSFT", "NVDA"], default: "GRID" }
        ]
    },
    balanced: {
        label: "平衡型",
        troops: [
            { type: "重戟核心", options: ["SCHD", "VIG", "VYM"], default: "SCHD" },
            { type: "方陣主力", options: ["XOM", "CVX", "JNJ"], default: "XOM" },
            { type: "重騎預備", options: ["O", "PLD", "AMT"], default: "O" }
        ]
    },
    defensive: {
        label: "防守型",
        troops: [
            { type: "前排鐵盾", options: ["AGG", "BND", "SHY"], default: "AGG" },
            { type: "輔助弓騎", options: ["CWB", "HYG", "SPSB"], default: "CWB" },
            { type: "糧草營", options: ["POWR", "XLU", "VIGI"], default: "POWR" }
        ]
    }
};

const marketConfigs = {
    bull1: { title: "先鋒突擊陣", qi: 60, zheng: 40, radar: [90, 40, 30, 60, 95] },
    bull2: { title: "全面擴張陣", qi: 50, zheng: 50, radar: [75, 60, 50, 70, 70] },
    bull3: { title: "鳴金收兵陣", qi: 20, zheng: 80, radar: [40, 85, 70, 90, 30] },
    bear2: { title: "堅壁清野陣", qi: 0, zheng: 100, radar: [5, 95, 95, 60, 5] }
};

function setSystem(sys, btn) {
    currentSystem = sys;
    document.querySelectorAll('.sys-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateSimulation();
}

function updateSimulation() {
    const market = marketConfigs[document.getElementById('market-cycle').value];
    const budget = document.getElementById('budget-input').value;
    const age = document.getElementById('user-age').value;
    
    document.getElementById('env-title').innerText = market.title;
    document.getElementById('risk-score').innerText = age > 45 ? "謹慎加強" : "穩健擴張";

    let html = "";
    let totalRet = 0;
    let totalDiv = 0;
    const sys = systems[currentSystem];

    sys.troops.forEach((troop, idx) => {
        const selectedTicker = troop.default; 
        const data = weaponData[selectedTicker] || { ret: 0.1, div: 0.02, env: "常規環境" };
        const weight = (idx === 0) ? market.qi : (market.zheng / 2);
        
        totalRet += data.ret * (weight / 100);
        totalDiv += data.div * (weight / 100);

        html += `<tr>
            <td><strong>${troop.type}</strong></td>
            <td>
                <select class="ticker-select" onchange="weaponChange(this, ${idx})">
                    ${troop.options.map(opt => `<option value="${opt}" ${opt === selectedTicker ? 'selected' : ''}>${opt}</option>`).join('')}
                </select>
            </td>
            <td>${weight}% ($${Math.round(budget * weight / 100)})</td>
            <td><span class="tag tag-env">${data.env}</span></td>
        </tr>`;
    });

    document.getElementById('army-tbody').innerHTML = html;
    document.getElementById('total-return').innerText = (totalRet * 100).toFixed(1) + "%";
    document.getElementById('dividend-return').innerText = (totalDiv * 100).toFixed(1) + "%";

    updateCharts(market);
}

function weaponChange(select, idx) {
    systems[currentSystem].troops[idx].default = select.value;
    updateSimulation();
}

function updateCharts(config) {
    const ctx1 = document.getElementById('ratioChart').getContext('2d');
    if (charts.ratio) charts.ratio.destroy();
    charts.ratio = new Chart(ctx1, {
        type: 'doughnut',
        data: {
            labels: ['奇兵 (進攻)', '正兵 (收息/防禦)'],
            datasets: [{ data: [config.qi, config.zheng], backgroundColor: ['#ff4757', '#2ed573'], borderWidth: 0 }]
        },
        options: { cutout: '70%', plugins: { legend: { labels: { color: '#e2e8f0' } } } }
    });

    const ctx2 = document.getElementById('radarChart').getContext('2d');
    if (charts.radar) charts.radar.destroy();
    charts.radar = new Chart(ctx2, {
        type: 'radar',
        data: {
            labels: ['攻擊', '防禦', '現金流', '抗通脹', '爆發力'],
            datasets: [{ data: config.radar, backgroundColor: 'rgba(241, 196, 15, 0.2)', borderColor: '#f1c40f' }]
        },
        options: { scales: { r: { grid: { color: '#334155' }, ticks: { display: false } } }, plugins: { legend: { display: false } } }
    });
}

updateSimulation();
</script>
</body>
</html>
